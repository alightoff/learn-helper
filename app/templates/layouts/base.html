<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title }} | {{ request.app.state.settings.app_name }}</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/app.css') }}" />
    <script src="{{ request.url_for('static', path='js/app.js') }}" defer></script>
  </head>
  <body>
    <div class="shell">
      <header class="site-header">
        <div class="site-header__inner">
          <div class="brand">
            <p class="brand__subtitle">Local-first self-study workspace</p>
            <h1 class="brand__title">{{ request.app.state.settings.app_name }}</h1>
          </div>

          <nav class="nav" aria-label="Primary navigation">
            <a class="nav__link" href="{{ request.url_for('dashboard_home') }}">Dashboard</a>
            <a class="nav__link" href="{{ request.url_for('courses_index') }}">Courses</a>
            <span class="nav__pill">Notes</span>
            <span class="nav__pill">Review</span>
            <span class="nav__pill">Sessions</span>
            <span class="nav__pill">Stats</span>
            <span class="nav__pill">Settings</span>
          </nav>
        </div>
      </header>

      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
